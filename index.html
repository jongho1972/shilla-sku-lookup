<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신라 SKU 조회</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --crimson: #8C0023;
      --gold: #B8922A;
      --bg: #FAFAF8;
      --card: #FFFFFF;
      --border: #E5E2DC;
      --text: #1A1A1A;
      --muted: #6B6560;
      --row-bg: #F6F4F1;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 64px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header .logo-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    header .logo-bar .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--crimson);
    }

    header .logo-bar .brand {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.15em;
      color: var(--crimson);
      text-transform: uppercase;
    }

    header h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 28px;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    header p {
      font-size: 14px;
      color: var(--muted);
      margin-top: 6px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    .input-row input {
      flex: 1;
      height: 48px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0 16px;
      font-size: 16px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.15s;
      outline: none;
    }

    .input-row input:focus {
      border-color: var(--crimson);
    }

    .input-row input::placeholder {
      font-weight: 400;
      letter-spacing: 0;
      color: #B0ABA4;
    }

    .btn-search {
      height: 48px;
      padding: 0 24px;
      background: var(--crimson);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-search:hover { background: #6e001a; }
    .btn-search:active { transform: scale(0.97); }
    .btn-search:disabled { background: #C8B9B9; cursor: default; }

    .status {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
      min-height: 20px;
      text-align: center;
    }

    .status.error { color: #C0392B; }

    /* 결과 테이블 */
    .result-wrap {
      margin-top: 24px;
      border-top: 1px solid var(--border);
      padding-top: 24px;
      display: none;
    }

    .result-wrap.show { display: block; }

    .result-table {
      width: 100%;
      border-collapse: collapse;
    }

    .result-table tr:nth-child(odd) td,
    .result-table tr:nth-child(odd) th {
      background: var(--row-bg);
    }

    .result-table th,
    .result-table td {
      padding: 11px 14px;
      font-size: 14px;
      border-radius: 0;
      vertical-align: middle;
    }

    .result-table th {
      width: 130px;
      color: var(--muted);
      font-weight: 500;
      text-align: left;
      white-space: nowrap;
    }

    .result-table td {
      color: var(--text);
      font-weight: 600;
      word-break: break-all;
    }

    .cell-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-copy {
      flex-shrink: 0;
      width: 28px; height: 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      padding: 0;
    }
    .btn-copy:hover { border-color: var(--crimson); color: var(--crimson); background: #fff8f9; }
    .btn-copy.copied { border-color: #27AE60; color: #27AE60; background: #F0FBF4; }

    .result-table td.brand-en {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.04em;
    }

    .result-table td.ref {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--crimson);
    }

    .result-table td.phone {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--gold);
    }

    .result-footer {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
    }

    .btn-link {
      font-size: 13px;
      color: var(--crimson);
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: opacity 0.15s;
    }

    .btn-link:hover { opacity: 0.7; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #E5E2DC;
      border-top-color: var(--crimson);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin-top: 48px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    footer a { color: var(--gold); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      header h1 { font-size: 22px; }
      .card { padding: 24px 20px; }
      .input-row { flex-direction: column; }
      .btn-search { height: 44px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-bar">
    <div class="dot"></div>
    <span class="brand">The Shilla Duty Free</span>
    <div class="dot"></div>
  </div>
  <h1>SKU 상품 조회</h1>
  <p>SKU 번호 입력 → 브랜드명 · REF.NO · 상품문의 전화번호 확인</p>
</header>

<div class="card">
  <div class="input-row">
    <input
      id="skuInput"
      type="text"
      inputmode="numeric"
      placeholder="SKU 번호 입력 (예: 096711001496)"
      autocomplete="off"
      spellcheck="false"
    />
    <button class="btn-search" id="btnSearch" onclick="doSearch()">조회</button>
  </div>
  <div class="status" id="status"></div>

  <div class="result-wrap" id="resultWrap">
    <table class="result-table" id="resultTable"></table>
    <div class="result-footer">
      <a id="detailLink" href="#" target="_blank" class="btn-link">
        신라 상품 페이지 열기 ↗
      </a>
    </div>
  </div>
</div>

<footer>Built with Claude Code by 이종호 (<a href="https://jhawk.kr" target="_blank">jhawk.kr</a>)</footer>

<script>
  const input = document.getElementById('skuInput');
  const btn   = document.getElementById('btnSearch');
  const status = document.getElementById('status');
  const wrap  = document.getElementById('resultWrap');
  const tbl   = document.getElementById('resultTable');
  const link  = document.getElementById('detailLink');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  async function doSearch() {
    const sku = input.value.trim();
    if (!sku) { showStatus('SKU 번호를 입력해주세요', 'error'); return; }

    btn.disabled = true;
    wrap.classList.remove('show');
    showStatus('<span class="spinner"></span>조회 중…');

    try {
      const res = await fetch(`/api/lookup?sku=${encodeURIComponent(sku)}`);
      const data = await res.json();

      if (!res.ok) {
        showStatus(data.detail || '조회 실패', 'error');
        return;
      }

      renderResult(data);
      showStatus('');
    } catch (e) {
      showStatus('서버에 연결할 수 없습니다', 'error');
    } finally {
      btn.disabled = false;
    }
  }

  function renderResult(d) {
    const rows = [
      ['국문 브랜드명', d.brand_kr || '—', ''],
      ['영문 브랜드명', d.brand_en || '—', 'brand-en'],
      ['상품명',       d.product_name || '—', ''],
      ['REF.NO',       d.ref_no || '—', 'ref'],
      ['SKU.NO',       d.sku || '—', ''],
      ['상품 문의',    d.phone || '—', 'phone'],
    ];

    tbl.innerHTML = rows.map(([label, value, cls]) =>
      `<tr><th>${label}</th><td class="${cls}"><div class="cell-wrap"><span>${escHtml(value)}</span>${value !== '—' ? `<button class="btn-copy" title="복사" onclick="copyVal(this,'${escAttr(value)}')">${COPY_ICON}</button>` : ''}</div></td></tr>`
    ).join('');

    if (d.detail_url) {
      link.href = d.detail_url;
      link.style.display = 'inline-flex';
    } else {
      link.style.display = 'none';
    }

    wrap.classList.add('show');
  }

  function showStatus(msg, type = '') {
    status.innerHTML = msg;
    status.className = 'status' + (type ? ` ${type}` : '');
  }

  const COPY_ICON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
  const CHECK_ICON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

  function copyVal(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      btn.innerHTML = CHECK_ICON;
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = COPY_ICON;
        btn.classList.remove('copied');
      }, 1500);
    });
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function escAttr(s) {
    return String(s).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
